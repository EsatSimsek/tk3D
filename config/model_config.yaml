pose2d:
  model_name: RTMW-x-l
  backend: mmpose
  config_path: models/rtmw/rtmw-x-l.py
  checkpoint_path: weights/rtmw-x-l.pth
  device: cuda:0
  input_size: [384, 288]
  keypoint_count: 133
  score_threshold: 0.30

pose3d_single_view:
  model_name: RTMW3D-x
  backend: mmpose
  config_path: models/rtmw3d/rtmw3d-x.py
  checkpoint_path: weights/rtmw3d-x.pth
  device: cuda:0
  keypoint_count: 133
  enabled: true

triangulation:
  min_views: 2
  min_keypoint_score: 0.30
  max_reprojection_error_px: 25.0

smoothing:
  method: moving_average
  window_size: 5
