pose2d:
  model_name: ViTPose-Huge-WholeBody
  backend: tk3d_vitpose_plus
  config_path: config/mmpose_configs/wholebody_2d_keypoint/vitpose/coco-wholebody/td-hm_ViTPose-huge_8xb64-210e_coco-wholebody-256x192.py
  checkpoint_path: weights/vitpose_huge_wholebody_256x192.pth
  device: cuda:0
  input_size: [256, 192]
  keypoint_count: 133
  score_threshold: 0.30

pose3d_single_view:
  model_name: RTMW3D-x
  backend: mmpose
  config_path: models/rtmw3d/rtmw3d-x.py
  checkpoint_path: weights/rtmw3d-x.pth
  device: cuda:0
  keypoint_count: 133
  enabled: false

triangulation:
  min_views: 2
  min_keypoint_score: 0.30
  min_triangulation_score: 0.20
  max_reprojection_error_px: 25.0
  max_hypotheses: 16

smoothing:
  method: moving_average
  window_size: 5
