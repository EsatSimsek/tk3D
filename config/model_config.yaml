pose2d:
  model_name: ViTPose-Huge-WholeBody
  backend: tk3d_vitpose_plus
  config_path: config/mmpose_configs/wholebody_2d_keypoint/vitpose/coco-wholebody/td-hm_ViTPose-huge_8xb64-210e_coco-wholebody-256x192.py
  checkpoint_path: weights/vitpose_huge_wholebody_256x192.pth
  device: cuda:0
  input_size: [256, 192]
  keypoint_count: 133
  score_threshold: 0.30
  flip_test: true
  temporal_filter_enabled: true
  temporal_stabilize_left_right: true

person_detector:
  enabled: true
  backend: rfdetr
  model_variant: small
  threshold: 0.25
  target_confidence_threshold: 0.65
  person_class_id: 1
  bbox_padding: 0.18
  bbox_stationary_alpha: 0.35
  bbox_motion_scale_ratio: 0.12
  track_activation_threshold: 0.25
  minimum_matching_threshold: 0.80
  lost_track_buffer: 30
  reacquire_after_frames: 12
  optimize_for_inference: false

pose3d_single_view:
  model_name: RTMW3D-x
  backend: mmpose
  config_path: models/rtmw3d/rtmw3d-x.py
  checkpoint_path: weights/rtmw3d-x.pth
  device: cuda:0
  keypoint_count: 133
  enabled: false

triangulation:
  min_views: 2
  min_keypoint_score: 0.30
  min_triangulation_score: 0.20
  max_reprojection_error_px: 25.0
  max_hypotheses: 16

smoothing:
  method: moving_average
  window_size: 5

reliability:
  max_bone_relative_deviation: 0.25
  max_bone_absolute_deviation_m: 0.08
  min_temporal_residual_m: 0.08
  max_temporal_acceleration_mps2: 70.0
  minimum_bone_samples: 5
  min_output_valid_body_ratio: 0.90
